services:

  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: market_db
      POSTGRES_USER: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  pipeline:
    build: .
    command: python pipeline/main.py
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: market_db
      DB_USER: postgres
      DB_PASSWORD: postgres

volumes:
  pgdata: